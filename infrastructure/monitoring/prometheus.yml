# LeadBridge Prometheus Configuration
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "leadflow-server"
    static_configs:
      - targets: ["server:3000"]
    metrics_path: "/metrics"
    scrape_interval: 15s

  - job_name: "leadflow-redis"
    static_configs:
      - targets: ["redis:6379"]
    scrape_interval: 30s

  - job_name: "leadflow-postgres"
    static_configs:
      - targets: ["postgres:9187"]
    scrape_interval: 30s

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
