name: LeadBridge CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  DOCKER_REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  server-tests:
    name: TypeScript Server Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: leadbridge_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: |
          cd server
          npm ci
          npx prisma generate

      - name: Lint
        run: |
          cd server
          npx eslint src/

      - name: Run unit tests (vitest)
        run: |
          cd server
          npm test -- --reporter=verbose
        env:
          DATABASE_URL_PRISMA: postgresql://postgres:postgres@localhost:5432/leadbridge_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ci-test-secret-key-that-is-at-least-32-chars-long
          JWT_REFRESH_SECRET: ci-test-refresh-secret-that-is-at-least-32-chars
          OMNIDIM_API_KEY: ci-test-omni-key
          ENCRYPTION_KEY: ci-test-encryption-key-12345

  server-e2e:
    name: E2E Lead Lifecycle Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: leadbridge_e2e
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: |
          cd server
          npm ci
          npx prisma generate
          npx prisma migrate deploy
        env:
          DATABASE_URL_PRISMA: postgresql://postgres:postgres@localhost:5432/leadbridge_e2e

      - name: Run E2E tests (RUN_E2E_TESTS=true)
        run: |
          cd server
          RUN_E2E_TESTS=true npx vitest run src/__tests__/e2e-lead-lifecycle.test.ts --reporter=verbose
        env:
          DATABASE_URL_PRISMA: postgresql://postgres:postgres@localhost:5432/leadbridge_e2e
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ci-test-secret-key-that-is-at-least-32-chars-long
          JWT_REFRESH_SECRET: ci-test-refresh-secret-that-is-at-least-32-chars
          OMNIDIM_API_KEY: ci-test-omni-key
          ENCRYPTION_KEY: ci-test-encryption-key-12345

  frontend-lint:
    name: Frontend Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Type check
        run: |
          cd frontend
          npx tsc --noEmit

      - name: Lint
        run: |
          cd frontend
          npm run lint

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build server image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          file: ./server/Dockerfile
          push: false
          tags: leadbridge-server:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          tags: leadbridge-frontend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Production
    needs: [server-tests, server-e2e, frontend-lint, docker-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push server image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}/server:latest
            ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}/server:${{ github.sha }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:latest
            ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:${{ github.sha }}

      - name: Run Prisma migrations
        run: |
          cd server
          npx prisma migrate deploy
        env:
          DATABASE_URL_PRISMA: ${{ secrets.PROD_DATABASE_URL }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            cd /opt/leadbridge
            docker compose pull
            docker compose up -d --remove-orphans
            docker system prune -f
