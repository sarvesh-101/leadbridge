# LeadFlow AI OS - Docker Compose Configuration
services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: leadflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: leadflow_ai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data

    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - leadflow-network

  # Redis Cache & Queue
  redis:
    image: redis:7-alpine
    container_name: leadflow-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redispass}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - leadflow-network

  # FastAPI Backend
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: leadflow-backend
    restart: unless-stopped
    env_file:
      - ../backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${DB_PASSWORD:-postgres}@postgres:5432/leadflow_ai
      REDIS_URL: redis://:${REDIS_PASSWORD:-redispass}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-redispass}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-redispass}@redis:6379/2
      ENVIRONMENT: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - backend_media:/app/media
      - ../backend:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - leadflow-network

  # Celery Worker
  celery_worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: leadflow-celery-worker
    restart: unless-stopped
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=4
    env_file:
      - ../backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${DB_PASSWORD:-postgres}@postgres:5432/leadflow_ai
      REDIS_URL: redis://:${REDIS_PASSWORD:-redispass}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-redispass}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-redispass}@redis:6379/2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../backend:/app
    networks:
      - leadflow-network

  # Celery Beat (Scheduler)
  celery_beat:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: leadflow-celery-beat
    restart: unless-stopped
    command: celery -A app.workers.celery_app beat --loglevel=info
    env_file:
      - ../backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${DB_PASSWORD:-postgres}@postgres:5432/leadflow_ai
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-redispass}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-redispass}@redis:6379/2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../backend:/app
    networks:
      - leadflow-network

  # Next.js Frontend
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: leadflow-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    depends_on:
      - backend
    ports:
      - "3000:3000"
    networks:
      - leadflow-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: leadflow-nginx
    restart: unless-stopped
    volumes:
      - ../infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ../infrastructure/nginx/leadflow.conf:/etc/nginx/conf.d/leadflow.conf
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
      - frontend
    networks:
      - leadflow-network

  # Prometheus Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: leadflow-prometheus
    restart: unless-stopped
    volumes:
      - ../infrastructure/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - leadflow-network

  # Grafana Dashboard
  grafana:
    image: grafana/grafana:latest
    container_name: leadflow-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ../infrastructure/monitoring/grafana-dashboards:/etc/grafana/provisioning/dashboards
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    networks:
      - leadflow-network

volumes:
  postgres_data:
  redis_data:
  backend_media:
  prometheus_data:
  grafana_data:

networks:
  leadflow-network:
    driver: bridge
