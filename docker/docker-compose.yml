# LeadBridge — Production Docker Compose
# Fastify TypeScript server + BullMQ workers + PostgreSQL + Redis + Nginx + Monitoring

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  # PostgreSQL Database
  postgres:
    logging: *default-logging
    image: postgres:16-alpine
    container_name: leadbridge-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: leadbridge
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - leadbridge-network

  # Redis Cache & Queue
  redis:
    logging: *default-logging
    image: redis:7-alpine
    container_name: leadbridge-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redispass}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD:-redispass} ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - leadbridge-network

  # Fastify TypeScript Server (API + WebSocket)
  server:
    logging: *default-logging
    build:
      context: ../server
      dockerfile: Dockerfile
    container_name: leadbridge-server
    restart: unless-stopped
    env_file:
      - ../server/.env
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-postgres}@postgres:5432/leadbridge
      DATABASE_URL_PRISMA: postgresql://postgres:${DB_PASSWORD:-postgres}@postgres:5432/leadbridge
      REDIS_URL: redis://:${REDIS_PASSWORD:-redispass}@redis:6379
      FRONTEND_URL: http://localhost:3001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - leadbridge-network

  # BullMQ Workers
  worker-call:
    logging: *default-logging
    build:
      context: ../server
      dockerfile: Dockerfile
    container_name: leadbridge-worker-call
    restart: unless-stopped
    command: node dist/workers/call.worker.js
    env_file:
      - ../server/.env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-postgres}@postgres:5432/leadbridge
      DATABASE_URL_PRISMA: postgresql://postgres:${DB_PASSWORD:-postgres}@postgres:5432/leadbridge
      REDIS_URL: redis://:${REDIS_PASSWORD:-redispass}@redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - leadbridge-network

  worker-notification:
    logging: *default-logging
    build:
      context: ../server
      dockerfile: Dockerfile
    container_name: leadbridge-worker-notification
    restart: unless-stopped
    command: node dist/workers/notification.worker.js
    env_file:
      - ../server/.env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-postgres}@postgres:5432/leadbridge
      DATABASE_URL_PRISMA: postgresql://postgres:${DB_PASSWORD:-postgres}@postgres:5432/leadbridge
      REDIS_URL: redis://:${REDIS_PASSWORD:-redispass}@redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - leadbridge-network

  worker-followup:
    logging: *default-logging
    build:
      context: ../server
      dockerfile: Dockerfile
    container_name: leadbridge-worker-followup
    restart: unless-stopped
    command: node dist/workers/followup.worker.js
    env_file:
      - ../server/.env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-postgres}@postgres:5432/leadbridge
      DATABASE_URL_PRISMA: postgresql://postgres:${DB_PASSWORD:-postgres}@postgres:5432/leadbridge
      REDIS_URL: redis://:${REDIS_PASSWORD:-redispass}@redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - leadbridge-network

  worker-reminder:
    logging: *default-logging
    build:
      context: ../server
      dockerfile: Dockerfile
    container_name: leadbridge-worker-reminder
    restart: unless-stopped
    command: node dist/workers/reminder.worker.js
    env_file:
      - ../server/.env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-postgres}@postgres:5432/leadbridge
      DATABASE_URL_PRISMA: postgresql://postgres:${DB_PASSWORD:-postgres}@postgres:5432/leadbridge
      REDIS_URL: redis://:${REDIS_PASSWORD:-redispass}@redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - leadbridge-network

  worker-extraction:
    logging: *default-logging
    build:
      context: ../server
      dockerfile: Dockerfile
    container_name: leadbridge-worker-extraction
    restart: unless-stopped
    command: node dist/workers/extraction.worker.js
    env_file:
      - ../server/.env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-postgres}@postgres:5432/leadbridge
      DATABASE_URL_PRISMA: postgresql://postgres:${DB_PASSWORD:-postgres}@postgres:5432/leadbridge
      REDIS_URL: redis://:${REDIS_PASSWORD:-redispass}@redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - leadbridge-network

  worker-webhook-retry:
    logging: *default-logging
    build:
      context: ../server
      dockerfile: Dockerfile
    container_name: leadbridge-worker-webhook-retry
    restart: unless-stopped
    command: node dist/workers/webhook-retry.worker.js
    env_file:
      - ../server/.env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-postgres}@postgres:5432/leadbridge
      DATABASE_URL_PRISMA: postgresql://postgres:${DB_PASSWORD:-postgres}@postgres:5432/leadbridge
      REDIS_URL: redis://:${REDIS_PASSWORD:-redispass}@redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - leadbridge-network

  worker-campaign:
    logging: *default-logging
    build:
      context: ../server
      dockerfile: Dockerfile
    container_name: leadbridge-worker-campaign
    restart: unless-stopped
    command: node dist/workers/campaign.worker.js
    env_file:
      - ../server/.env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-postgres}@postgres:5432/leadbridge
      DATABASE_URL_PRISMA: postgresql://postgres:${DB_PASSWORD:-postgres}@postgres:5432/leadbridge
      REDIS_URL: redis://:${REDIS_PASSWORD:-redispass}@redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - leadbridge-network

  # Next.js Frontend
  frontend:
    logging: *default-logging
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: leadbridge-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3000/api/v1
      NEXT_PUBLIC_APP_URL: http://localhost:3001
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    depends_on:
      - server
    ports:
      - "3001:3000"
    networks:
      - leadbridge-network

  # Nginx Reverse Proxy
  nginx:
    logging: *default-logging
    image: nginx:alpine
    container_name: leadbridge-nginx
    restart: unless-stopped
    volumes:
      - ../infrastructure/nginx/leadflow.conf:/etc/nginx/conf.d/leadbridge.conf
      - ../infrastructure/nginx/ssl:/etc/nginx/ssl
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - server
      - frontend
    networks:
      - leadbridge-network

  # PostgreSQL Exporter (Prometheus metrics)
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: leadbridge-postgres-exporter
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATA_SOURCE_NAME: "postgresql://postgres:${DB_PASSWORD:-postgres}@postgres:5432/leadbridge?sslmode=disable"
    logging: *default-logging
    networks:
      - leadbridge-network

  # Prometheus Monitoring
  prometheus:
    logging: *default-logging
    image: prom/prometheus:latest
    container_name: leadbridge-prometheus
    restart: unless-stopped
    volumes:
      - ../infrastructure/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - postgres-exporter
    networks:
      - leadbridge-network

  # Grafana Dashboard
  grafana:
    logging: *default-logging
    image: grafana/grafana:latest
    container_name: leadbridge-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ../infrastructure/monitoring/grafana-dashboards:/etc/grafana/provisioning/dashboards
    ports:
      - "3002:3000"
    depends_on:
      - prometheus
    networks:
      - leadbridge-network

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  leadbridge-network:
    driver: bridge
